<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    :root {
      --primary-color: #4f46e5; /* indigo-600 */
      --accent-color: #ef4444;  /* red-500 */
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --primary-color: #818cf8; /* indigo-400 */
        --accent-color: #fb7185;  /* rose-400 */
      }
    }
    .clock-ring {
      stroke: var(--primary-color);
      fill: none;
      stroke-width: 8;
    }
    .clock-hand-hour {
      stroke: var(--primary-color);
      stroke-width: 7;
      stroke-linecap: round;
    }
    .clock-hand-minute {
      stroke: var(--primary-color);
      stroke-width: 5;
      stroke-linecap: round;
    }
    .clock-tick {
      stroke: var(--primary-color);
      stroke-width: 3.5;
      stroke-linecap: round;
      opacity: 0.7;
    }
    .clock-pivot {
      fill: var(--primary-color);
    }
    .clock-accent {
      fill: var(--accent-color);
    }
  </style>
  
  <!-- Outer Ring (Radius 42, center 50,50) -->
  <circle cx="50" cy="50" r="42" class="clock-ring" />
  
  <!-- Ticks at 12, 6, 9, 3 o'clock -->
  <line x1="50" y1="14" x2="50" y2="22" class="clock-tick" />
  <line x1="50" y1="86" x2="50" y2="78" class="clock-tick" />
  <line x1="14" y1="50" x2="22" y2="50" class="clock-tick" />
  <line x1="86" y1="50" x2="78" y2="50" class="clock-tick" />
  
  <!-- 18-minute Accent Dot (at angle 108 deg, radius 36) -->
  <circle cx="84" cy="61" r="4.5" class="clock-accent" />
  
  <!-- Hour Hand (angle 69 deg for 2:18, length 20) -->
  <line x1="50" y1="50" x2="69" y2="43" class="clock-hand-hour" />
  
  <!-- Minute Hand (angle 108 deg for 18 minutes, length 30) -->
  <line x1="50" y1="50" x2="79" y2="59" class="clock-hand-minute" />
  
  <!-- Center Pivot -->
  <circle cx="50" cy="50" r="5" class="clock-pivot" />
</svg>
